{% load static i18n %}
<aside id="logo-sidebar"
  class="fixed top-0 left-0 z-40 w-64 h-screen pt-16 transition-transform -translate-x-full bg-white border-r border-gray-200 sm:translate-x-0 dark:bg-gray-800 dark:border-gray-700"
  aria-label="Sidebar">

  <div class="h-full px-4 pb-4 overflow-y-auto bg-white dark:bg-gray-800">
    
    <!-- Navigation principale -->
    <div class="pt-6">
      <ul class="space-y-2">

        <li>
          <a href="{% url 'partners:dashboard' %}"
            class="flex items-center p-3 text-gray-700 rounded-xl dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-white  group transition-all duration-150">
            <span class="flex items-center justify-center w-8 h-8 rounded-lg bg-gray-100 dark:bg-gray-700 group-hover:bg-orange-100 dark:group-hover:bg-orange-900/30 transition-colors">
              <svg class="w-4 h-4 text-gray-500 dark:text-gray-400 group-hover:text-orange-500" fill="currentColor" viewBox="0 0 22 21">
                <path d="M16.975 11H10V4.025a1 1 0 0 0-1.066-.998 8.5 8.5 0 1 0 9.039 9.039.999.999 0 0 0-1-1.066h.002Z"/>
                <path d="M12.5 0c-.157 0-.311.01-.565.027A1 1 0 0 0 11 1.02V10h8.975a1 1 0 0 0 1-.935c.013-.188.028-.374.028-.565A8.51 8.51 0 0 0 12.5 0Z"/>
              </svg>
            </span>
            <span class="ms-3 font-medium">{% trans "Dashboard" %}</span>
          </a>
        </li>

        <li>
          <a href="{% url 'partners:event_list' %}"
            class="flex items-center p-3 text-gray-700 rounded-xl dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-white group transition-all duration-150">
            <span class="flex items-center justify-center w-8 h-8 rounded-lg bg-gray-100 dark:bg-gray-700 group-hover:bg-blue-100 dark:group-hover:bg-blue-900/30 transition-colors">
              <svg class="w-4 h-4 text-gray-500 dark:text-gray-400 group-hover:text-blue-500" fill="currentColor" viewBox="0 0 20 20">
                <path d="M20 4a2 2 0 0 0-2-2h-2V1a1 1 0 0 0-2 0v1h-3V1a1 1 0 0 0-2 0v1H6V1a1 1 0 0 0-2 0v1H2a2 2 0 0 0-2 2v2h20V4ZM0 18a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8H0v10Zm5-8h10a1 1 0 0 1 0 2H5a1 1 0 0 1 0-2Z"/>
              </svg>
            </span>
            <span class="ms-3 font-medium">{% trans "Événements" %}</span>
          </a>
        </li>

        <li>
          <a href="{% url 'partners:ad_list' %}"
            class="flex items-center p-3 text-gray-700 rounded-xl dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-white group transition-all duration-150">
            <span class="flex items-center justify-center w-8 h-8 rounded-lg bg-gray-100 dark:bg-gray-700 group-hover:bg-purple-100 dark:group-hover:bg-purple-900/30 transition-colors">
              <svg class="w-4 h-4 text-gray-500 dark:text-gray-400 group-hover:text-purple-500" fill="currentColor" viewBox="0 0 18 18">
                <path d="M6.143 0H1.857A1.857 1.857 0 0 0 0 1.857v4.286C0 7.169.831 8 1.857 8h4.286A1.857 1.857 0 0 0 8 6.143V1.857A1.857 1.857 0 0 0 6.143 0Zm10 0h-4.286A1.857 1.857 0 0 0 10 1.857v4.286C10 7.169 10.831 8 11.857 8h4.286A1.857 1.857 0 0 0 18 6.143V1.857A1.857 1.857 0 0 0 16.143 0Zm-10 10H1.857A1.857 1.857 0 0 0 0 11.857v4.286C0 17.169.831 18 1.857 18h4.286A1.857 1.857 0 0 0 8 16.143v-4.286A1.857 1.857 0 0 0 6.143 10Zm10 0h-4.286A1.857 1.857 0 0 0 10 11.857v4.286c0 1.026.831 1.857 1.857 1.857h4.286A1.857 1.857 0 0 0 18 16.143v-4.286A1.857 1.857 0 0 0 16.143 10Z"/>
              </svg>
            </span>
            <span class="ms-3 font-medium">{% trans "Publicités" %}</span>
          </a>
        </li>

        <li>
          <a href="{% url 'partners:subscription' %}"
            class="flex items-center p-3 text-gray-700 rounded-xl dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-white group transition-all duration-150">
            <span class="flex items-center justify-center w-8 h-8 rounded-lg bg-gray-100 dark:bg-gray-700 group-hover:bg-green-100 dark:group-hover:bg-green-900/30 transition-colors">
              <svg class="w-4 h-4 text-gray-500 dark:text-gray-400 group-hover:text-green-500" fill="currentColor" viewBox="0 0 20 14">
                <path d="M18 0H2a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2ZM2 12V6h16v6H2Zm16-10v2H2V2h16Z"/>
                <path d="M5 10h3a1 1 0 0 0 0-2H5a1 1 0 0 0 0 2Z"/>
              </svg>
            </span>
            <span class="ms-3 font-medium">{% trans "Abonnement" %}</span>
          </a>
        </li>

      </ul>
    </div>

    <!-- Séparateur + Compte -->
    <div class="pt-6 mt-6 border-t border-gray-200 dark:border-gray-700">
      <p class="px-2 mb-3 text-xs font-semibold text-gray-400 uppercase tracking-wider dark:text-gray-500">
        {% trans "Compte" %}
      </p>
      <ul class="space-y-2">
        <li>
          <a href="{% url 'partners:account' %}"
            class="flex items-center p-3 text-gray-700 rounded-xl dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-white group transition-all duration-150">
            <span class="flex items-center justify-center w-8 h-8 rounded-lg bg-gray-100 dark:bg-gray-700 group-hover:bg-gray-200 dark:group-hover:bg-gray-600 transition-colors">
              <svg class="w-4 h-4 text-gray-500 dark:text-gray-400 group-hover:text-gray-700 dark:group-hover:text-white" fill="currentColor" viewBox="0 0 20 20">
                <path d="M18 7.5h-.423l-.452-1.09.3-.3a1.5 1.5 0 0 0 0-2.121L16.01 2.575a1.5 1.5 0 0 0-2.121 0l-.3.3-1.089-.452V2A1.5 1.5 0 0 0 11 .5H9A1.5 1.5 0 0 0 7.5 2v.423l-1.09.452-.3-.3a1.5 1.5 0 0 0-2.121 0L2.576 3.99a1.5 1.5 0 0 0 0 2.121l.3.3L2.423 7.5H2A1.5 1.5 0 0 0 .5 9v2A1.5 1.5 0 0 0 2 12.5h.423l.452 1.09-.3.3a1.5 1.5 0 0 0 0 2.121l1.415 1.413a1.5 1.5 0 0 0 2.121 0l.3-.3 1.09.452V18A1.5 1.5 0 0 0 9 19.5h2a1.5 1.5 0 0 0 1.5-1.5v-.423l1.09-.452.3.3a1.5 1.5 0 0 0 2.121 0l1.415-1.414a1.5 1.5 0 0 0 0-2.121l-.3-.3.452-1.09H18a1.5 1.5 0 0 0 1.5-1.5V9A1.5 1.5 0 0 0 18 7.5Zm-8 6a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Z"/>
              </svg>
            </span>
            <span class="ms-3 font-medium">{% trans "Paramètres" %}</span>
          </a>
        </li>
      </ul>
    </div>

  </div>
</aside>
