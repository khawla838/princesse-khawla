{% extends 'guard/base/index.html' %}
{% load i18n %}

{% block body %}
<div class="p-4 sm:ml-64">
  <div class="p-4 mt-14">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">{% trans "Paramètres de prix" %}</h2>

    {% if messages %}
      {% for message in messages %}
        <div class="p-4 mb-4 text-green-800 rounded-lg bg-green-50 dark:bg-gray-800 dark:text-green-400">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="post" class="max-w-md">
      {% csrf_token %}
      <div class="mb-6">
        <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
          {% trans "Prix boost événement (TND/jour)" %}
        </label>
        <input type="number" step="0.001" min="0" name="boost_price_per_day"
               value="{{ pricing.boost_price_per_day }}"
               class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
      </div>
      <div class="mb-6">
        <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
          {% trans "Prix publicité (TND/jour)" %}
        </label>
        <input type="number" step="0.001" min="0" name="ad_price_per_day"
               value="{{ pricing.ad_price_per_day }}"
               class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
      </div>
      <button type="submit"
              class="text-white bg-blue-700 hover:bg-blue-800 font-medium rounded-lg text-sm px-5 py-2.5">
        {% trans "Enregistrer" %}
      </button>
    </form>
  </div>
</div>
{% endblock body %}
